  <!-- Subtle inner accent border -->
  <rect x="1" y="1" width="46" height="46" rx="11" fill="none" stroke="#c98a3e" stroke-width="1.5" stroke-opacity="0.2" />
  
  <!-- Left Page (Shaded Amber) -->
  <path d="M24 37c-4.5-3.5-10.5-3.5-15-3.5V12c4.5 0 10.5 0 15 3.5Z" fill="#c98a3e" />
  
